<svg viewBox="0 0 1000 1450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: bold; fill: #1a1a1a; }
      .subtitle { font-size: 14px; fill: #666; }
      .section-title { font-size: 13px; font-weight: bold; fill: #1a1a1a; }
      .label { font-size: 12px; fill: #333; }
      .small-label { font-size: 11px; fill: #666; }
      .code { font-family: monospace; font-size: 11px; fill: #333; }
      .box { stroke-width: 2; rx: 3; }
      .arrow { stroke-width: 2; fill: none; }
      .failure-text { font-size: 11px; font-weight: bold; fill: #d32f2f; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#d32f2f"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1450" fill="#f8f9fa"/>

  <!-- Header -->
  <text x="500" y="40" class="title" text-anchor="middle">Use Case 5: SSL Certificate Validation Failure</text>
  <text x="500" y="65" class="subtitle" text-anchor="middle">TLS Handshake Failure &amp; Transaction Rollback</text>

  <!-- ========== REQUEST OVERVIEW ========== -->
  <text x="50" y="110" class="section-title">Request Details</text>

  <rect x="50" y="125" width="900" height="100" fill="#fce4ec" stroke="#c2185b" class="box"/>

  <text x="70" y="150" class="label" font-weight="bold">Endpoint:</text>
  <text x="250" y="150" class="code">POST /bytebite/checkout</text>

  <text x="70" y="175" class="label" font-weight="bold">Trigger:</text>
  <text x="250" y="175" class="code">-H "Content-Type: application/json" -d '{"cart":[...],"failureType":"ssl"}'</text>

  <text x="70" y="200" class="label" font-weight="bold">What Happens:</text>
  <text x="250" y="200" class="small-label">SSL/TLS certificate validation fails (self-signed cert in lab)</text>
  <text x="250" y="218" class="small-label">Transaction has already started → partial inserts → ROLLBACK</text>

  <!-- ========== EXECUTION FLOW ========== -->
  <text x="50" y="280" class="section-title">Execution Flow with Failure Point</text>

  <!-- Step 1: HTTP Request -->
  <rect x="100" y="310" width="800" height="55" fill="#e3f2fd" stroke="#1976d2" class="box"/>
  <text x="115" y="330" class="label" font-weight="bold">① HTTP Request</text>
  <text x="115" y="350" class="code">POST /checkout with cart items + failureType=ssl</text>

  <!-- Arrow -->
  <path d="M 500 365 L 500 395" class="arrow" marker-end="url(#arrow)"/>

  <!-- Step 2: Filter Chain -->
  <rect x="100" y="395" width="800" height="55" fill="#fff3e0" stroke="#f57c00" class="box"/>
  <text x="115" y="415" class="label" font-weight="bold">② Filter Chain</text>
  <text x="115" y="435" class="code">LDAPAuthenticationFilter (checks session/auth)</text>

  <!-- Arrow -->
  <path d="M 500 450 L 500 480" class="arrow" marker-end="url(#arrow)"/>

  <!-- Step 3: Servlet -->
  <rect x="100" y="480" width="800" height="70" fill="#f8bbd0" stroke="#c2185b" class="box"/>
  <text x="115" y="500" class="label" font-weight="bold">③ CheckoutServlet.doPost()</text>
  <text x="115" y="522" class="code">Parse JSON cart items</text>
  <text x="115" y="540" class="code">→ orderService.createOrder(items, failureType)</text>

  <!-- Arrow -->
  <path d="M 500 550 L 500 580" class="arrow" marker-end="url(#arrow)"/>

  <!-- Step 4: Service -->
  <rect x="100" y="580" width="800" height="70" fill="#f8bbd0" stroke="#c2185b" class="box"/>
  <text x="115" y="600" class="label" font-weight="bold">④ OrderService.createOrder()</text>
  <text x="115" y="622" class="code">Validate items → orderDAO.createTransaction()</text>
  <text x="115" y="640" class="code">→ Prepare database write</text>

  <!-- Arrow -->
  <path d="M 500 650 L 500 680" class="arrow" marker-end="url(#arrow)"/>

  <!-- Step 5: DAO - Transaction Start -->
  <rect x="100" y="680" width="800" height="70" fill="#f8bbd0" stroke="#c2185b" class="box"/>
  <text x="115" y="700" class="label" font-weight="bold">⑤ OrderDAO.createTransaction()</text>
  <text x="115" y="722" class="code">BEGIN TRANSACTION</text>
  <text x="115" y="740" class="code">INSERT INTO orders, order_items, order_total tables</text>

  <!-- Arrow -->
  <path d="M 500 750 L 500 780" class="arrow" marker-end="url(#arrow)"/>

  <!-- Step 6: Partial Writes -->
  <rect x="100" y="780" width="800" height="70" fill="#fff9c4" stroke="#fbc02d" class="box" stroke-width="2"/>
  <text x="115" y="800" class="label" font-weight="bold">⑥ Partial Writes to Database</text>
  <text x="115" y="822" class="code">✓ INSERT into orders (succeeded)</text>
  <text x="115" y="840" class="code">✓ INSERT into order_items (succeeded)</text>

  <!-- Arrow -->
  <path d="M 500 850 L 500 880" class="arrow" marker-end="url(#arrow)"/>

  <!-- FAILURE POINT -->
  <rect x="50" y="880" width="900" height="150" fill="#ffccbc" stroke="#d32f2f" class="box" stroke-width="3"/>
  <rect x="50" y="880" width="900" height="30" fill="#d32f2f"/>
  <text x="500" y="903" class="label" text-anchor="middle" fill="#fff" font-weight="bold">⚠️ FAILURE INJECTION POINT</text>

  <text x="70" y="930" class="failure-text">failureType == "ssl" triggers:</text>
  <text x="85" y="955" class="code">→ Service attempts external SSL connection (payment gateway)</text>
  <text x="85" y="973" class="code">→ SSL certificate validation check: CERT_SELF_SIGNED</text>
  <text x="85" y="991" class="code">→ throw new SSLHandshakeException("PKIX validation failed")</text>
  <text x="85" y="1009" class="code">→ Exception caught in OrderService</text>

  <!-- Arrow -->
  <path d="M 500 1030 L 500 1060" class="arrow-red" marker-end="url(#arrow-red)"/>

  <!-- Transaction Rollback -->
  <rect x="100" y="1060" width="800" height="80" fill="#ffcccc" stroke="#d32f2f" class="box" stroke-width="2"/>
  <text x="115" y="1080" class="label" font-weight="bold">⑦ Transaction Rollback</text>
  <text x="115" y="1102" class="code">ROLLBACK (all inserts undone)</text>
  <text x="115" y="1120" class="code">orders, order_items, order_total: data reverted</text>

  <!-- Arrow -->
  <path d="M 500 1140 L 500 1170" class="arrow" marker-end="url(#arrow)"/>

  <!-- Step 8: Response -->
  <rect x="100" y="1170" width="800" height="70" fill="#f5f5f5" stroke="#666" class="box"/>
  <text x="115" y="1190" class="label" font-weight="bold">⑧ HTTP 500 / SSL Error Response</text>
  <text x="115" y="1212" class="code">JSON: { error: "SSL Certificate Validation Failed" }</text>
  <text x="115" y="1230" class="code">or: { error: "Payment gateway unavailable" }</text>

  <!-- ========== TRANSACTION LIFECYCLE ========== -->
  <text x="50" y="1290" class="section-title">Transaction Timeline During SSL Failure</text>

  <rect x="50" y="1310" width="900" height="240" fill="#f5f5f5" stroke="#666" class="box" stroke-width="2"/>

  <!-- Timeline 1 -->
  <rect x="70" y="1330" width="860" height="45" fill="#c8e6c9" stroke="#388e3c" class="box"/>
  <text x="80" y="1350" class="small-label" font-weight="bold">T=0ms: BEGIN TRANSACTION</text>
  <text x="80" y="1365" class="code">Auto-commit OFF, isolation=READ_COMMITTED</text>

  <!-- Timeline 2 -->
  <rect x="70" y="1385" width="860" height="45" fill="#fff9c4" stroke="#fbc02d" class="box"/>
  <text x="80" y="1405" class="small-label" font-weight="bold">T=100ms: INSERT into orders, order_items</text>
  <text x="80" y="1420" class="code">✓ Both INSERT operations succeed locally</text>

  <!-- Timeline 3 -->
  <rect x="70" y="1440" width="860" height="45" fill="#ffccbc" stroke="#d32f2f" class="box"/>
  <text x="80" y="1460" class="small-label" font-weight="bold">T=150ms: SSL validation fails</text>
  <text x="80" y="1475" class="code">SSLHandshakeException thrown → ROLLBACK entire transaction</text>

  <!-- Timeline 4 -->
  <rect x="70" y="1495" width="860" height="45" fill="#ffcccc" stroke="#d32f2f" class="box"/>
  <text x="80" y="1515" class="small-label" font-weight="bold">T=160ms: ROLLBACK COMPLETE</text>
  <text x="80" y="1530" class="code">orders, order_items rows deleted; transaction closed</text>

  <!-- ========== DIAGNOSTIC SIGNALS ========== -->
  <text x="50" y="1650" class="section-title">What to Look For in catalina.log</text>

  <rect x="50" y="1670" width="900" height="350" fill="#fff9c4" stroke="#fbc02d" class="box" stroke-width="2"/>

  <text x="70" y="1695" class="label" font-weight="bold">Log Signals:</text>

  <rect x="70" y="1715" width="860" height="50" fill="#fff" stroke="#fbc02d" class="box"/>
  <text x="85" y="1735" class="code" font-weight="bold">"❌ SSL Certificate Validation Failed"</text>
  <text x="85" y="1755" class="small-label">Line 68 in CheckoutServlet.java when failureType=ssl</text>

  <rect x="70" y="1775" width="860" height="50" fill="#fff" stroke="#fbc02d" class="box"/>
  <text x="85" y="1795" class="code" font-weight="bold">"javax.net.ssl.SSLHandshakeException: ... PKIX validation failed"</text>
  <text x="85" y="1815" class="small-label">Java SSL subsystem logs certificate validation error</text>

  <rect x="70" y="1835" width="860" height="50" fill="#fff" stroke="#fbc02d" class="box"/>
  <text x="85" y="1855" class="code" font-weight="bold">"ROLLBACK [orderId=ORD-XXX]"</text>
  <text x="85" y="1875" class="small-label">Database transaction rolled back; no rows persisted</text>

  <rect x="70" y="1895" width="860" height="50" fill="#fff" stroke="#fbc02d" class="box"/>
  <text x="85" y="1915" class="code" font-weight="bold">timestamp: 01-Jun-2026 10:03:45.789 ERROR [http-nio]</text>
  <text x="85" y="1935" class="small-label">Error stack trace shows OrderService → OrderDAO → SSL</text>

  <!-- Footer -->
  <text x="500" y="2000" class="small-label" text-anchor="middle" font-style="italic">Use this diagram to trace transaction rollback failures in book chapter on external system dependencies</text>
</svg>