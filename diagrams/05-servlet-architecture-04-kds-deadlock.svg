<svg viewBox="0 0 1100 1700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: bold; fill: #1a1a1a; }
      .subtitle { font-size: 14px; fill: #666; }
      .section-title { font-size: 13px; font-weight: bold; fill: #1a1a1a; }
      .label { font-size: 12px; fill: #333; }
      .small-label { font-size: 11px; fill: #666; }
      .code { font-family: monospace; font-size: 11px; fill: #333; }
      .box { stroke-width: 2; rx: 3; }
      .arrow { stroke-width: 2; fill: none; }
      .failure-text { font-size: 11px; font-weight: bold; fill: #d32f2f; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#d32f2f"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="1700" fill="#f8f9fa"/>

  <!-- Header -->
  <text x="550" y="40" class="title" text-anchor="middle">Use Case 4: Database Deadlock</text>
  <text x="550" y="65" class="subtitle" text-anchor="middle">Circular Lock Wait Between Two Transactions</text>

  <!-- ========== REQUEST OVERVIEW ========== -->
  <text x="50" y="110" class="section-title">Request Details</text>

  <rect x="50" y="125" width="1000" height="100" fill="#fff3e0" stroke="#f57c00" class="box"/>

  <text x="70" y="150" class="label" font-weight="bold">Endpoint:</text>
  <text x="280" y="150" class="code">POST /bytebite/api/kds (Kitchen Display System)</text>

  <text x="70" y="175" class="label" font-weight="bold">Trigger:</text>
  <text x="280" y="175" class="code">-H "Content-Type: application/json" -d '{"orderId":"ORD-1","failureType":"deadlock"}'</text>

  <text x="70" y="200" class="label" font-weight="bold">What Happens:</text>
  <text x="280" y="200" class="small-label">Two concurrent transactions lock tables in opposite order</text>
  <text x="280" y="218" class="small-label">Transaction 1: locks kds_orders → waits for orders</text>
  <text x="280" y="236" class="small-label">Transaction 2: locks orders → waits for kds_orders</text>

  <!-- ========== EXECUTION FLOW ========== -->
  <text x="50" y="300" class="section-title">Concurrent Execution Flow with Deadlock</text>

  <!-- Transaction 1 Header -->
  <rect x="50" y="330" width="480" height="30" fill="#ffe0b2" stroke="#f57c00" class="box" stroke-width="2"/>
  <text x="290" y="350" class="label" text-anchor="middle" font-weight="bold">Transaction 1: KDS Update Request</text>

  <!-- Transaction 2 Header -->
  <rect x="570" y="330" width="480" height="30" fill="#fff3e0" stroke="#f57c00" class="box" stroke-width="2"/>
  <text x="810" y="350" class="label" text-anchor="middle" font-weight="bold">Transaction 2: Checkout Order Request</text>

  <!-- Step 1 -->
  <rect x="60" y="375" width="460" height="70" fill="#ffe0b2" stroke="#f57c00" class="box"/>
  <text x="290" y="395" class="label" text-anchor="middle" font-weight="bold">① KDSServlet.doPost()</text>
  <text x="290" y="415" class="code" text-anchor="middle">kdsService.updateOrderStatus()</text>

  <rect x="580" y="375" width="460" height="70" fill="#fff3e0" stroke="#f57c00" class="box"/>
  <text x="810" y="395" class="label" text-anchor="middle" font-weight="bold">① CheckoutServlet.doPost()</text>
  <text x="810" y="415" class="code" text-anchor="middle">orderService.createOrder()</text>

  <!-- Arrow -->
  <path d="M 290 445 L 290 475" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 810 445 L 810 475" class="arrow" marker-end="url(#arrow)"/>

  <!-- Step 2: Begin Transaction -->
  <rect x="60" y="475" width="460" height="70" fill="#ffe0b2" stroke="#f57c00" class="box"/>
  <text x="290" y="495" class="label" text-anchor="middle" font-weight="bold">② BEGIN TRANSACTION</text>
  <text x="290" y="515" class="code" text-anchor="middle">conn.setAutoCommit(false)</text>

  <rect x="580" y="475" width="460" height="70" fill="#fff3e0" stroke="#f57c00" class="box"/>
  <text x="810" y="495" class="label" text-anchor="middle" font-weight="bold">② BEGIN TRANSACTION</text>
  <text x="810" y="515" class="code" text-anchor="middle">conn.setAutoCommit(false)</text>

  <!-- Arrow -->
  <path d="M 290 545 L 290 575" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 810 545 L 810 575" class="arrow" marker-end="url(#arrow)"/>

  <!-- Step 3: Lock T1 -->
  <rect x="60" y="575" width="460" height="70" fill="#ffccbc" stroke="#d32f2f" class="box" stroke-width="2"/>
  <text x="290" y="595" class="label" text-anchor="middle" font-weight="bold">③ Lock kds_orders table</text>
  <text x="290" y="615" class="code" text-anchor="middle">UPDATE kds_orders SET status=...</text>
  <text x="290" y="630" class="small-label" text-anchor="middle" fill="#d32f2f">✓ Lock acquired</text>

  <rect x="580" y="575" width="460" height="70" fill="#ffccbc" stroke="#d32f2f" class="box" stroke-width="2"/>
  <text x="810" y="595" class="label" text-anchor="middle" font-weight="bold">③ Lock orders table</text>
  <text x="810" y="615" class="code" text-anchor="middle">INSERT INTO orders SET order_id=...</text>
  <text x="810" y="630" class="small-label" text-anchor="middle" fill="#d32f2f">✓ Lock acquired</text>

  <!-- Arrow -->
  <path d="M 290 645 L 290 675" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 810 645 L 810 675" class="arrow" marker-end="url(#arrow)"/>

  <!-- FAILURE POINT -->
  <rect x="50" y="675" width="1000" height="140" fill="#ffccbc" stroke="#d32f2f" class="box" stroke-width="3"/>
  <rect x="50" y="675" width="1000" height="30" fill="#d32f2f"/>
  <text x="550" y="698" class="label" text-anchor="middle" fill="#fff" font-weight="bold">⚠️ FAILURE INJECTION POINT: Reverse Lock Order</text>

  <text x="70" y="725" class="failure-text">failureType == "deadlock" triggers:</text>
  <text x="85" y="745" class="code">Transaction 1: Now tries to INSERT INTO orders</text>
  <text x="85" y="763" class="code">Transaction 2: Now tries to UPDATE kds_orders</text>
  <text x="85" y="781" class="code">→ Both transactions are BLOCKED waiting for each other's locks</text>

  <!-- Arrow -->
  <path d="M 290 815 L 290 845" class="arrow-red" marker-end="url(#arrow-red)"/>
  <path d="M 810 815 L 810 845" class="arrow-red" marker-end="url(#arrow-red)"/>

  <!-- Deadlock State -->
  <rect x="60" y="845" width="460" height="90" fill="#ffcccc" stroke="#d32f2f" class="box" stroke-width="2"/>
  <text x="290" y="865" class="label" text-anchor="middle" font-weight="bold">④ DEADLOCK DETECTED</text>
  <text x="290" y="885" class="code" text-anchor="middle">Wait for orders lock</text>
  <text x="290" y="905" class="code" text-anchor="middle">BLOCKED ❌</text>

  <rect x="580" y="845" width="460" height="90" fill="#ffcccc" stroke="#d32f2f" class="box" stroke-width="2"/>
  <text x="810" y="865" class="label" text-anchor="middle" font-weight="bold">④ DEADLOCK DETECTED</text>
  <text x="810" y="885" class="code" text-anchor="middle">Wait for kds_orders lock</text>
  <text x="810" y="905" class="code" text-anchor="middle">BLOCKED ❌</text>

  <!-- Arrow -->
  <path d="M 290 935 L 290 965" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 810 935 L 810 965" class="arrow" marker-end="url(#arrow)"/>

  <!-- DB Resolution -->
  <rect x="60" y="965" width="460" height="80" fill="#ffcccc" stroke="#d32f2f" class="box" stroke-width="2"/>
  <text x="290" y="985" class="label" text-anchor="middle" font-weight="bold">⑤ PostgreSQL Deadlock Resolution</text>
  <text x="290" y="1005" class="code" text-anchor="middle">DB detects circular wait → ROLLBACK one transaction</text>
  <text x="290" y="1023" class="code" text-anchor="middle">"ERROR: deadlock detected"</text>

  <rect x="580" y="965" width="460" height="80" fill="#ffcccc" stroke="#d32f2f" class="box" stroke-width="2"/>
  <text x="810" y="985" class="label" text-anchor="middle" font-weight="bold">⑤ PostgreSQL Deadlock Resolution</text>
  <text x="810" y="1005" class="code" text-anchor="middle">Other transaction continues, commits successfully</text>
  <text x="810" y="1023" class="code" text-anchor="middle">✓ COMMIT</text>

  <!-- Arrow -->
  <path d="M 290 1045 L 290 1075" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 810 1045 L 810 1075" class="arrow" marker-end="url(#arrow)"/>

  <!-- Response -->
  <rect x="60" y="1075" width="460" height="55" fill="#f5f5f5" stroke="#666" class="box"/>
  <text x="290" y="1095" class="label" text-anchor="middle" font-weight="bold">⑥ HTTP 500 Error</text>
  <text x="290" y="1115" class="code" text-anchor="middle">"Deadlock detected"</text>

  <rect x="580" y="1075" width="460" height="55" fill="#c8e6c9" stroke="#388e3c" class="box"/>
  <text x="810" y="1095" class="label" text-anchor="middle" font-weight="bold">⑥ HTTP 200 Success</text>
  <text x="810" y="1115" class="code" text-anchor="middle">Order created successfully</text>

  <!-- ========== DEADLOCK GRAPH ========== -->
  <text x="50" y="1170" class="section-title">Lock Dependency Graph (Circular Wait)</text>

  <rect x="50" y="1190" width="1000" height="220" fill="#fff3e0" stroke="#f57c00" class="box" stroke-width="2"/>

  <!-- T1 box -->
  <rect x="80" y="1220" width="200" height="80" fill="#ffccbc" stroke="#d32f2f" class="box" stroke-width="2"/>
  <text x="180" y="1240" class="label" text-anchor="middle" font-weight="bold">Transaction 1</text>
  <text x="180" y="1260" class="code" text-anchor="middle">Holds: kds_orders lock</text>
  <text x="180" y="1278" class="code" text-anchor="middle">Waits for: orders lock</text>

  <!-- Arrow T1 -> T2 -->
  <path d="M 280 1260 L 450 1260" stroke="#d32f2f" stroke-width="3" fill="none" marker-end="url(#arrow-red)"/>
  <text x="365" y="1248" class="failure-text" text-anchor="middle">waits for</text>

  <!-- T2 box -->
  <rect x="470" y="1220" width="200" height="80" fill="#fff3e0" stroke="#f57c00" class="box" stroke-width="2"/>
  <text x="570" y="1240" class="label" text-anchor="middle" font-weight="bold">Transaction 2</text>
  <text x="570" y="1260" class="code" text-anchor="middle">Holds: orders lock</text>
  <text x="570" y="1278" class="code" text-anchor="middle">Waits for: kds_orders lock</text>

  <!-- Arrow T2 -> T1 (circular back) -->
  <path d="M 470 1280 Q 350 1350 280 1300" stroke="#d32f2f" stroke-width="3" fill="none" marker-end="url(#arrow-red)"/>
  <text x="350" y="1355" class="failure-text" text-anchor="middle">waits for</text>

  <!-- Circular notice -->
  <text x="550" y="1380" class="failure-text" text-anchor="middle">⚠️ CIRCULAR DEPENDENCY = DEADLOCK</text>

  <!-- ========== DIAGNOSTIC SIGNALS ========== -->
  <text x="50" y="1450" class="section-title">What to Look For in catalina.log &amp; PostgreSQL Logs</text>

  <rect x="50" y="1470" width="1000" height="330" fill="#fff9c4" stroke="#fbc02d" class="box" stroke-width="2"/>

  <text x="70" y="1495" class="label" font-weight="bold">Log Signals in catalina.log:</text>

  <rect x="70" y="1515" width="960" height="50" fill="#fff" stroke="#fbc02d" class="box"/>
  <text x="85" y="1535" class="code" font-weight="bold">"❌ DEADLOCK SCENARIO: Both threads are now BLOCKED"</text>
  <text x="85" y="1555" class="small-label">Line 55 in KDSServlet.java when failureType=deadlock</text>

  <rect x="70" y="1575" width="960" height="50" fill="#fff" stroke="#fbc02d" class="box"/>
  <text x="85" y="1595" class="code" font-weight="bold">"org.postgresql.util.PSQLException: ERROR: deadlock detected"</text>
  <text x="85" y="1615" class="small-label">PostgreSQL sends deadlock error to JDBC driver</text>

  <text x="70" y="1660" class="label" font-weight="bold">Log Signals in PostgreSQL logs (docker logs bytebite-postgres):</text>

  <rect x="70" y="1680" width="960" height="50" fill="#fff" stroke="#fbc02d" class="box"/>
  <text x="85" y="1700" class="code" font-weight="bold">"ERROR:  deadlock detected" (line 1 of 1)</text>
  <text x="85" y="1720" class="small-label">PostgreSQL deadlock log entry with DETAIL: transaction log</text>

  <!-- Footer -->
  <text x="550" y="1800" class="small-label" text-anchor="middle" font-style="italic">Use this diagram to trace circular lock contention in book chapter on concurrent transaction failures</text>
</svg>