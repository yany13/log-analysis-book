<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 28px; font-weight: bold; fill: #1a1a1a; }
      .section-title { font-size: 16px; font-weight: bold; fill: #1a1a1a; }
      .label { font-size: 12px; fill: #333; }
      .small-label { font-size: 11px; fill: #666; }
      .box-header { font-size: 13px; font-weight: bold; }
      .component-box { stroke-width: 2; rx: 5; }
      .arrow { stroke-width: 2; fill: none; }
      .dashed-line { stroke-dasharray: 5,5; stroke-width: 1.5; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="700" y="35" class="title" text-anchor="middle">ByteBite Infrastructure Architecture</text>
  <text x="700" y="60" font-size="14" text-anchor="middle" fill="#666">JDK 21 • Tomcat 11 • PostgreSQL 15 • OpenLDAP 1.5 • Docker Compose</text>

  <!-- ========== BROWSER SECTION ========== -->
  <g id="browser-section">
    <rect x="550" y="80" width="300" height="80" fill="#e3f2fd" stroke="#1976d2" class="component-box"/>
    <text x="700" y="105" class="box-header" text-anchor="middle" fill="#1976d2">🌐 Browser User</text>
    <text x="700" y="125" class="label" text-anchor="middle">(HTTP/HTTPS Client)</text>
    <text x="700" y="145" class="small-label" text-anchor="middle">Port 8080 | Port 8443</text>
  </g>

  <!-- Arrow Down -->
  <path d="M 700 160 L 700 190" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- ========== TOMCAT SECTION ========== -->
  <g id="tomcat-section">
    <rect x="350" y="190" width="700" height="240" fill="#fff3e0" stroke="#f57c00" class="component-box" stroke-width="3"/>
    <text x="700" y="215" class="box-header" text-anchor="middle" fill="#f57c00">Apache Tomcat 11</text>

    <!-- Servlet Layer -->
    <rect x="370" y="235" width="220" height="50" fill="#ffe0b2" stroke="#f57c00" class="component-box"/>
    <text x="480" y="256" class="label" text-anchor="middle" font-weight="bold">6 Servlets</text>
    <text x="480" y="272" class="small-label" text-anchor="middle">Login • Menu • Checkout</text>
    <text x="480" y="284" class="small-label" text-anchor="middle">Analytics • KDS • Health</text>

    <!-- Filter Layer -->
    <rect x="610" y="235" width="220" height="50" fill="#ffe0b2" stroke="#f57c00" class="component-box"/>
    <text x="720" y="256" class="label" text-anchor="middle" font-weight="bold">4 Filters</text>
    <text x="720" y="272" class="small-label" text-anchor="middle">RequestLogging • Auth</text>
    <text x="720" y="284" class="small-label" text-anchor="middle">CORS • SecurityHeaders</text>

    <!-- Service Layer -->
    <rect x="850" y="235" width="170" height="50" fill="#ffe0b2" stroke="#f57c00" class="component-box"/>
    <text x="935" y="256" class="label" text-anchor="middle" font-weight="bold">3 Services</text>
    <text x="935" y="272" class="small-label" text-anchor="middle">User • Order • Analytics</text>

    <!-- Detailed Components -->
    <rect x="370" y="305" width="650" height="110" fill="#fff9c4" stroke="#fbc02d" class="component-box"/>

    <text x="385" y="325" class="small-label" font-weight="bold">Request Pipeline:</text>
    <text x="385" y="343" class="small-label">① RequestLoggingFilter → Logs all HTTP requests/responses</text>
    <text x="385" y="359" class="small-label">② LDAPAuthenticationFilter → Validates session &amp; user credentials</text>
    <text x="385" y="375" class="small-label">③ CORSFilter + SecurityHeadersFilter → Cross-origin &amp; security headers</text>
    <text x="385" y="391" class="small-label">④ Servlet Dispatcher → Routes to appropriate servlet handler</text>
    <text x="385" y="407" class="small-label">⑤ FailureInjectionUtil → Triggers engineered failures on demand</text>
  </g>

  <!-- Arrows from Tomcat to Services -->
  <path d="M 480 430 L 480 460" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 720 430 L 720 460" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 935 430 L 935 460" class="arrow" marker-end="url(#arrowhead)"/>

  <text x="450" y="450" class="small-label">LDAP Bind</text>
  <text x="680" y="450" class="small-label">JDBC Queries</text>
  <text x="910" y="450" class="small-label">Logging</text>

  <!-- ========== DATABASE SECTION ========== -->
  <g id="database-section">
    <rect x="80" y="460" width="290" height="180" fill="#f3e5f5" stroke="#7b1fa2" class="component-box"/>
    <text x="225" y="485" class="box-header" text-anchor="middle" fill="#7b1fa2">PostgreSQL 15</text>
    <text x="225" y="505" class="label" text-anchor="middle" font-weight="bold">bytebite_db</text>

    <text x="95" y="525" class="small-label" font-weight="bold">Tables:</text>
    <text x="95" y="541" class="small-label">• users, sessions, user_roles</text>
    <text x="95" y="556" class="small-label">• orders, order_items, kds_orders</text>
    <text x="95" y="571" class="small-label">• menu_items, analytics_events</text>
    <text x="95" y="586" class="small-label">• application_logs, api_audit_log</text>

    <text x="95" y="606" class="small-label" font-weight="bold">Connection Pool:</text>
    <text x="95" y="621" class="small-label">HikariCP (Max: 20 connections)</text>
  </g>

  <!-- ========== LDAP SECTION ========== -->
  <g id="ldap-section">
    <rect x="420" y="460" width="290" height="180" fill="#e8f5e9" stroke="#388e3c" class="component-box"/>
    <text x="565" y="485" class="box-header" text-anchor="middle" fill="#388e3c">OpenLDAP 1.5</text>
    <text x="565" y="505" class="label" text-anchor="middle" font-weight="bold">Authentication</text>

    <text x="435" y="525" class="small-label" font-weight="bold">Base DN:</text>
    <text x="435" y="541" class="small-label">dc=bytebite,dc=local</text>
    <text x="435" y="556" class="small-label">Admin: cn=admin</text>

    <text x="435" y="576" class="small-label" font-weight="bold">Test Users (6):</text>
    <text x="435" y="591" class="small-label">admin • manager • staff1/2</text>
    <text x="435" y="606" class="small-label">kds_operator • customer1</text>
  </g>

  <!-- ========== LOGGING SECTION ========== -->
  <g id="logging-section">
    <rect x="760" y="460" width="290" height="180" fill="#fce4ec" stroke="#c2185b" class="component-box"/>
    <text x="905" y="485" class="box-header" text-anchor="middle" fill="#c2185b">Logging Pipeline</text>
    <text x="905" y="505" class="label" text-anchor="middle" font-weight="bold">SLF4J/JUL</text>

    <text x="775" y="525" class="small-label" font-weight="bold">Handler:</text>
    <text x="775" y="541" class="small-label">AsyncFileHandler</text>
    <text x="775" y="556" class="small-label">Output: catalina.YYYY-MM-DD.log</text>

    <text x="775" y="576" class="small-label" font-weight="bold">Configuration:</text>
    <text x="775" y="591" class="small-label">• Daily rotation</text>
    <text x="775" y="606" class="small-label">• 90-day retention</text>
  </g>

  <!-- ========== DOCKER NETWORK SECTION ========== -->
  <g id="docker-section">
    <rect x="1100" y="460" width="280" height="180" fill="#e0f2f1" stroke="#00796b" class="component-box"/>
    <text x="1240" y="485" class="box-header" text-anchor="middle" fill="#00796b">Docker Compose</text>
    <text x="1240" y="505" class="label" text-anchor="middle" font-weight="bold">Network</text>

    <text x="1115" y="525" class="small-label" font-weight="bold">Services:</text>
    <text x="1115" y="541" class="small-label">① bytebite-tomcat</text>
    <text x="1115" y="556" class="small-label">② bytebite-postgres</text>
    <text x="1115" y="571" class="small-label">③ bytebite-openldap</text>
    <text x="1115" y="586" class="small-label">④ bytebite-adhoc</text>

    <text x="1115" y="606" class="small-label" font-weight="bold">Bridge Network:</text>
    <text x="1115" y="621" class="small-label">bytebite-net</text>
  </g>

  <!-- Connection Lines -->
  <path d="M 370 520 L 370 520" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="370" y1="520" x2="410" y2="520" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="390" y="515" class="small-label" fill="#666">Port 5432</text>

  <line x1="410" y1="520" x2="410" y2="500" stroke="#666" stroke-width="2"/>
  <line x1="410" y1="500" x2="420" y2="500" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="400" y="495" class="small-label" fill="#666">Port 389</text>

  <!-- ========== KEY FEATURES SECTION ========== -->
  <rect x="80" y="680" width="1300" height="190" fill="#fff8e1" stroke="#fbc02d" class="component-box"/>

  <text x="730" y="705" class="section-title" text-anchor="middle">🔧 Key Architecture Points</text>

  <g id="features">
    <text x="100" y="735" class="label" font-weight="bold">User Entry:</text>
    <text x="100" y="753" class="small-label">• HTTP on port 8080 (local development)</text>
    <text x="100" y="768" class="small-label">• HTTPS on port 8443 (TLS with self-signed cert)</text>

    <text x="700" y="735" class="label" font-weight="bold">Request Flow:</text>
    <text x="700" y="753" class="small-label">• Filter chain validates session and authenticates user</text>
    <text x="700" y="768" class="small-label">• FailureInjectionUtil intercepts requests for chaos testing</text>

    <text x="100" y="805" class="label" font-weight="bold">Data Persistence:</text>
    <text x="100" y="823" class="small-label">• HikariCP connection pool with max 20 connections</text>
    <text x="100" y="838" class="small-label">• PreparedStatements for SQL injection protection</text>

    <text x="700" y="805" class="label" font-weight="bold">Failure Injection:</text>
    <text x="700" y="823" class="small-label">• 5 engineered failure vectors for chaos testing</text>
    <text x="700" y="838" class="small-label">• Triggered via HTTP parameter or JSON body</text>
  </g>
</svg>